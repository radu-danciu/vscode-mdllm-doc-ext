name: Release Repair

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-build.yml"
      - ".github/workflows/release-repair.yml"
      - "scripts/release-info.cjs"
      - "scripts/verify-release-tag.cjs"
      - "scripts/verify-github-release.cjs"
      - "package.json"
      - "VERSION"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish or repair.
        required: false
        type: string

jobs:
  repair_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target tag
        id: target_tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            target_tag="${{ inputs.release_tag }}"
          else
            git fetch --tags --force
            target_tag="$(git tag --sort=-v:refname | head -n 1)"
          fi

          if [ -z "$target_tag" ]; then
            echo "No release tags found to repair."
            exit 1
          fi

          echo "tag=$target_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout target tag
        run: git checkout "${{ steps.target_tag.outputs.tag }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate target tag
        run: |
          target_tag="${{ steps.target_tag.outputs.tag }}"
          if ! [[ "$target_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9a-f]+$ ]]; then
            echo "Invalid release tag format: $target_tag"
            exit 1
          fi

          checked_out_tag="$(git describe --tags --exact-match HEAD)"
          if [ "$checked_out_tag" != "$target_tag" ]; then
            echo "Checked out $checked_out_tag, expected $target_tag"
            exit 1
          fi

      - name: Run checks
        run: xvfb-run -a npm run check

      - name: Package release artifact
        run: npm run package:release

      - name: Resolve release metadata
        id: release_info
        env:
          GITHUB_REF_NAME: ${{ steps.target_tag.outputs.tag }}
        run: |
          artifact_path="$(npm run --silent release:info -- --field artifactPath)"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Publish or repair GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target_tag.outputs.tag }}
          name: ${{ steps.target_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: ${{ steps.release_info.outputs.artifact_path }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true

      - name: Verify GitHub release state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.target_tag.outputs.tag }}
        run: |
          export PACKAGE_NAME="$(node -p "require('./package.json').name")"
          node <<'EOF'
          const attempts = 12;
          const delayMs = 5000;
          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const tagName = process.env.RELEASE_TAG;
          const assetName = `${process.env.PACKAGE_NAME}-${tagName.replace(/^v/, '')}.vsix`;

          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${token}`,
            'User-Agent': 'vscode-mdllm-doc-ext-release-repair'
          };

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function getJson(path) {
            const response = await fetch(`https://api.github.com${path}`, { headers });
            if (!response.ok) {
              throw new Error(`${path} -> ${response.status} ${await response.text()}`);
            }
            return response.json();
          }

          async function retry(check) {
            let lastError;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                await check();
                return;
              } catch (error) {
                lastError = error;
                if (attempt < attempts) {
                  await sleep(delayMs);
                }
              }
            }
            throw lastError;
          }

          await retry(async () => {
            const release = await getJson(`/repos/${repository}/releases/tags/${encodeURIComponent(tagName)}`);
            if (release.draft || release.prerelease) {
              throw new Error(`Release ${tagName} is not fully published yet.`);
            }
            if (!release.assets.some((asset) => asset.name === assetName)) {
              throw new Error(`Release ${tagName} is missing ${assetName}.`);
            }

            const latest = await getJson(`/repos/${repository}/releases/latest`);
            if (latest.tag_name !== tagName) {
              throw new Error(`Latest release is ${latest.tag_name}, expected ${tagName}.`);
            }
          });

          console.log(`Verified ${tagName} as latest with ${assetName}.`);
          EOF
